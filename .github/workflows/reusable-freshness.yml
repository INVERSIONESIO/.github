name: Freshness check (reusable)

on:
  workflow_call:

jobs:
  freshness:
    name: freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check up-to-date with main
        run: |
          git fetch origin main
          BEHIND=$(git rev-list --count HEAD..origin/main)
          if [ "$BEHIND" -gt 0 ]; then
            echo "::error::La rama esta $BEHIND commits detras de main. Rebasa contra main:"
            echo "::error::  git fetch origin main && git rebase origin/main && git push --force-with-lease"
            exit 1
          fi
          echo "Rama al dia con main."
