name: Gate Main (reusable)

on:
  workflow_call:

jobs:
  gate-main:
    name: gate-main
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check hotfix bypass
        id: hotfix
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            if (labels.includes('hotfix-emergency')) {
              core.info('🚨 Hotfix detectado — bypass de gate-main');
              core.setOutput('bypass', 'true');
            } else {
              core.setOutput('bypass', 'false');
            }

      - name: Verify feature commits are in qas
        if: steps.hotfix.outputs.bypass != 'true'
        run: |
          git fetch origin qas main

          # Get non-merge commits in PR that aren't in main (the actual feature commits)
          FEATURE_COMMITS=$(git rev-list --no-merges origin/main..${{ github.event.pull_request.head.sha }})

          if [ -z "$FEATURE_COMMITS" ]; then
            echo "✅ No hay commits de feature nuevos (solo merges de resolución)"
            exit 0
          fi

          MISSING=""
          for commit in $FEATURE_COMMITS; do
            if ! git merge-base --is-ancestor "$commit" origin/qas; then
              SHORT=$(git rev-parse --short "$commit")
              MSG=$(git log -1 --format="%s" "$commit")
              MISSING="$MISSING\n  - $SHORT $MSG"
            fi
          done

          if [ -n "$MISSING" ]; then
            echo "::error::❌ Los siguientes commits no están en qas:$MISSING"
            echo "::error::Primero mergea tu PR a qas."
            exit 1
          fi

          echo "✅ Todos los commits de feature están en qas"

      - name: Propagate deploy status if available
        if: steps.hotfix.outputs.bypass != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.pull_request.head.sha;
            const { data: qasRef } = await github.rest.git.getRef({
              owner: context.repo.owner, repo: context.repo.repo, ref: 'heads/qas'
            });
            const { data: statuses } = await github.rest.repos.listCommitStatusesForRef({
              owner: context.repo.owner, repo: context.repo.repo, ref: qasRef.object.sha
            });
            const deployed = statuses.find(s => s.context === 'Deploy exitoso (qas)' && s.state === 'success');
            if (deployed) {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner, repo: context.repo.repo, sha,
                state: 'success', context: 'Deploy exitoso (qas)',
                description: 'QAS desplegado — propagado por gate-main'
              });
              core.info(`✅ Deploy status propagado a ${sha.substring(0, 7)}`);
            } else {
              core.info('Deploy de qas aún no completado. El deploy lo propagará cuando termine.');
            }
