name: Gate QAS (reusable)

on:
  workflow_call:

jobs:
  gate-qas:
    name: gate-qas
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify feature commits are in dev
        run: |
          git fetch origin dev qas

          # Get non-merge commits in PR that aren't in qas (the actual feature commits)
          FEATURE_COMMITS=$(git rev-list --no-merges origin/qas..${{ github.event.pull_request.head.sha }})

          if [ -z "$FEATURE_COMMITS" ]; then
            echo "✅ No hay commits de feature nuevos (solo merges de resolución)"
            exit 0
          fi

          MISSING=""
          for commit in $FEATURE_COMMITS; do
            if ! git merge-base --is-ancestor "$commit" origin/dev; then
              SHORT=$(git rev-parse --short "$commit")
              MSG=$(git log -1 --format="%s" "$commit")
              MISSING="$MISSING\n  - $SHORT $MSG"
            fi
          done

          if [ -n "$MISSING" ]; then
            echo "::error::❌ Los siguientes commits no están en dev:$MISSING"
            echo "::error::Primero mergea tu PR a dev."
            exit 1
          fi

          echo "✅ Todos los commits de feature están en dev"

      - name: Propagate deploy status if available
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.pull_request.head.sha;
            const { data: devRef } = await github.rest.git.getRef({
              owner: context.repo.owner, repo: context.repo.repo, ref: 'heads/dev'
            });
            const { data: statuses } = await github.rest.repos.listCommitStatusesForRef({
              owner: context.repo.owner, repo: context.repo.repo, ref: devRef.object.sha
            });
            const deployed = statuses.find(s => s.context === 'Deploy exitoso (dev)' && s.state === 'success');
            if (deployed) {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner, repo: context.repo.repo, sha,
                state: 'success', context: 'Deploy exitoso (dev)',
                description: 'Dev desplegado — propagado por gate-qas'
              });
              core.info(`✅ Deploy status propagado a ${sha.substring(0, 7)}`);
            } else {
              core.info('Deploy de dev aún no completado. El deploy lo propagará cuando termine.');
            }
